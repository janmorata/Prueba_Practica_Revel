name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d allure-results ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
            npm run report:generate
          else
            mkdir -p allure-report
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '<head><meta charset="utf-8"><title>Allure Report</title></head>' \
              '<body style="font-family: Arial, sans-serif; margin: 40px;">' \
              '<h1>Allure Report</h1>' \
              '<p>No Allure results were generated yet. Add real .spec.ts tests and run the workflow again.</p>' \
              '</body>' \
              '</html>' > allure-report/index.html
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          path: allure-report/

  deploy:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
